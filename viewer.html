<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Renderize It | Interactive Experience</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at top, #111 0%, #050505 100%);
      color: #fff;
      text-align: center;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    /* LOGO */
    .logo {
      width: 90px;
      margin-bottom: 20px;
    }

    /* TITLE */
    .title {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    /* SUBTITLE */
    .subtitle {
      font-size: 0.95rem;
      color: #bdbdbd;
      margin-bottom: 20px;
    }

    /* INSTRUCTION */
    .instruction {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      font-size: 0.9rem;
      margin-bottom: 25px;
      backdrop-filter: blur(6px);
    }

    /* VIEWER FRAME */
    .viewer-wrapper {
      border-radius: 16px;
      overflow: hidden;
      background: #0f0f0f;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 40px rgba(100,150,255,0.15);
      border: 1px solid rgba(255,255,255,0.05);
    }

    iframe {
      width: 100%;
      height: 75vh;
      min-height: 600px;
      border: none;
      display: block;
    }

    /* FOOTER BRANDING */
    .footer {
      margin-top: 20px;
      font-size: 0.8rem;
      color: #777;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .title {
        font-size: 1.5rem;
      }

      iframe {
        height: 65vh;
        min-height: 420px;
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- LOGO -->
    <img src="renderizeit-r.png" class="logo" alt="Renderize It Logo">

    <!-- TITLE -->
    <div class="title">Vikan HyGo Interactive Experience</div>

    <!-- SUBTITLE -->
    <div class="subtitle">Real-time 3D product visualization</div>

    <!-- INSTRUCTIONS -->
    <div class="instruction">Drag to rotate</div>

    <!-- VIEWER -->
    <div class="viewer-wrapper">
      <iframe src="HyGo_Web_Blue.html" allowfullscreen></iframe>
    </div>

    <!-- FOOTER -->
    <div class="footer">Renderize It • Product Visualization Studio</div>

  </div>
  
  <script>
    setTimeout(() => {
      const el = document.querySelector('.instruction');
      if (el) el.style.opacity = '0';
    }, 4000);
  </script>

</body>
</html>
