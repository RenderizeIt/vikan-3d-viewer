<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Renderize It | Interactive Experience</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at top, #111 0%, #050505 100%);
      color: #fff;
      text-align: center;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    /* LOGO */
    .logo {
      width: 90px;
      margin-bottom: 10px;
    }

    /* TITLE */
    .title {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    /* SUBTITLE */
    .subtitle {
      font-size: 0.95rem;
      color: #bdbdbd;
      margin-bottom: 20px;
    }

    /* VIEWER CONTAINER */
    .viewer-container {
      position: relative;
    }

    /* RESET BUTTON */
    .reset-btn {
      position: absolute;
      bottom: 20px;
      left: 50%;
	  transform: translateX(-50%);
      z-index: 9999;

      padding: 10px 18px;
      border-radius: 999px;

      background: rgba(0,0,0,0.75);
      color: #ffffff;
	  
      font-size: 0.9rem;
	  font-weight: 500;

      cursor: pointer;
      transition: all 0.2s ease;

      border: none;
	  backdrop-filter: blur(6px);
	  
	  box-shadow: 0 0 20px rgba(100,150,255,0.2); 
    }

    .reset-btn:hover {
      background: rgba(100,150,255,0.25);
      border-shadow: 0 0 25px rgba(100,150,255,0.5);
    }

    /* INSTRUCTION OVERLAY */
    .instruction {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;

      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(0,0,0,0.75);
      color: #ffffff;

      font-size: 0.9rem;
      font-weight: 500;

      transition: opacity 0.4s ease;
      opacity: 1;
    }

    /* VIEWER FRAME */
    .viewer-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 16px;
      overflow: hidden;
      background: #0f0f0f;
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow:
        0 20px 50px rgba(0,0,0,0.6),
        0 0 40px rgba(100,150,255,0.15);
    }

    .viewer-wrapper iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* FOOTER */
    .footer {
      margin-top: 20px;
      font-size: 0.8rem;
      color: #777;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .title {
        font-size: 1.5rem;
      }

      .logo {
        width: 75px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- LOGO -->
    <img src="renderizeit-r.png" class="logo" alt="Renderize It Logo">

    <!-- TITLE -->
    <div class="title">Vikan HyGo Interactive Experience</div>

    <!-- SUBTITLE -->
    <div class="subtitle">Real-time 3D product visualization</div>

    <!-- VIEWER -->
    <div class="viewer-container">

      <!-- RESET BUTTON -->
      <div class="reset-btn" onclick="resetViewer()">Reset View</div>

      <!-- VIEWER FRAME -->
      <div class="viewer-wrapper">
        <iframe id="viewerFrame" src="HyGo_Web_Blue.html" allowfullscreen></iframe>
      </div>

      <!-- INSTRUCTIONS -->
      <div class="instruction">Drag to rotate</div>

    </div>

    <!-- FOOTER -->
    <div class="footer">Renderize It • Product Visualization Studio</div>

  </div>

  <script>
    const instruction = document.querySelector('.instruction');
    const viewer = document.querySelector('.viewer-container');

    // Fade out after load
    setTimeout(() => {
      if (instruction) instruction.style.opacity = '0';
    }, 4000);

    // Show on hover
    viewer.addEventListener('mouseenter', () => {
      if (instruction) instruction.style.opacity = '1';
    });

    // Hide when mouse leaves
    viewer.addEventListener('mouseleave', () => {
      if (instruction) instruction.style.opacity = '0';
    });

    // Hide immediately on interaction
    viewer.addEventListener('mousedown', () => {
      if (instruction) instruction.style.opacity = '0';
    });

    viewer.addEventListener('touchstart', () => {
      if (instruction) instruction.style.opacity = '0';
    });

    // Reset viewer by reloading iframe
    function resetViewer() {
      const iframe = document.getElementById('viewerFrame');
      iframe.src = iframe.src;
    }
  </script>

</body>
</html>
