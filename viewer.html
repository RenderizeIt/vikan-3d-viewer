<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Interactive Product Viewer</title>
</head>

<body style="margin:0; background: radial-gradient(circle at center, #ffffff 0%, #eef2f5 100%); font-family:Arial, sans-serif;">

  <div style="display:flex; justify-content:center; align-items:center; height:100vh;">

    <div style="
      width:90%;
      max-width:1400px;
      background:white;
      border-radius:12px;
      box-shadow:0 20px 50px rgba(0,0,0,0.1);
      position:relative;
      overflow:hidden;
    ">

      <!-- Label -->
      <div style="position:absolute; top:15px; left:20px; font-size:14px; color:#888;">
        Interactive Product Viewer
      </div>

      <!-- Branding -->
      <div style="position:absolute; top:15px; right:20px; font-size:12px; color:#aaa;">
        Renderize It
      </div>

      <!-- Viewer -->
      <div style="position:relative; width:100%; height:80vh;">
        
        <iframe 
          src="HyGo_Web_Blue.html"
          style="width:100%; height:100%; border:0;">
        </iframe>

        <!-- Instructions -->
        <div style="
          position:absolute;
          bottom:20px;
          left:50%;
          transform:translateX(-50%);
          background:rgba(0,0,0,0.6);
          color:white;
          padding:10px 16px;
          border-radius:20px;
          font-size:14px;
        ">
          Click + Drag to Rotate
        </div>

      </div>

    </div>

  </div>

</body>
</html>
